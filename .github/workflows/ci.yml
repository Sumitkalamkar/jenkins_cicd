name: CICD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  build:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show files
      run: ls -la

    - name: Build step
      run: echo "Building project..."

  test:
    needs: build
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Run tests
      run: python -m pytest

  deploy:
    needs: test
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build and run container
      run: |
        docker stop my-app || true
        docker rm my-app || true 
        docker build -t my-app .
        docker run -d -p 5000:5000 --name my-app my-app


           
