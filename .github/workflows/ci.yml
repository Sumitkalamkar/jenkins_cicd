name: CICD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show files
      run: ls -la

    - name: Build step
      run: echo "Building project..."

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Run tests
      run: python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user
  
          if [ -d "jenkins_cicd" ]; then
            cd jenkins_cicd
            git pull
          else
            git clone https://github.com/Sumitkalamkar/jenkins_cicd.git
            cd jenkins_cicd
          fi
  
          docker stop my-app || true
          docker rm my-app || true
  
          docker build -t my-app .
          docker run -d -p 5000:5000 --name my-app my-app



           
