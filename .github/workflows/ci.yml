name: CICD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show files
      run: ls -la

    - name: Build step
      run: echo "Building project..."

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Run tests
      run: python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Deploy step
      run: echo "Deploying application..."
